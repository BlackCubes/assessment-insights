[tool.black]
line-length = 88
target-version = ['py310', 'py311', 'py312', 'py313', 'py314']
include = '\.pyi?$'

[tool.isort]
profile = "django"
combine_as_imports = true
include_trailing_comma = true
line_length = 88
multi_line_output = 3
src_paths = ["src"]
known_first_party = ["config", "apps", "api", "ws"]

[tool.djlint]
profile = "django"
ignore = "H031"
